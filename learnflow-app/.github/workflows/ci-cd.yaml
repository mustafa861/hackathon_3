name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: learnflow-app/frontend/package-lock.json
      - run: cd learnflow-app/frontend && npm ci
      - run: cd learnflow-app/frontend && npm run lint
      - run: cd learnflow-app/frontend && npm test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: learnflow-app/backend/requirements.txt
      - run: cd learnflow-app/backend && pip install -r requirements.txt
      - run: cd learnflow-app/backend && pytest

  build-images:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: learnflow-app/frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: learnflow-app/backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Update image tags
        run: |
          sed -i "s|learnflow-frontend:latest|ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}|g" learnflow-app/k8s/base/frontend.yaml
          sed -i "s|learnflow-backend:latest|ghcr.io/${{ github.repository }}/backend:${{ github.sha }}|g" learnflow-app/k8s/base/backend.yaml
      - name: Apply manifests
        run: kubectl apply -f learnflow-app/k8s/base/
